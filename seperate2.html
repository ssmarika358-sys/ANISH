<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card | Anish Shrestha</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: #fff;
            border-radius: 150px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            border-radius: 40%;
            width: 100px;
            height: 120px;
            object-fit: cover;
            border: 4px solid #007bff;
            margin-bottom: 15px;
        }

        .student-name {
            margin: 10px 0 5px;
            color: #333;
            text-transform: capitalize;
        }

        .faculty {
            color: #007bff;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .contact-btn {
            background-color: #0c0d0e;
            color: white;
            border: black;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .contact-btn:hover {
            background-color: #030303;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://via.placeholder.com/150" alt="Anish Shrestha" class="profile-img">
        <h2 class="student-name">Anish Shrestha</h2>
        <p class="faculty">Computer Science Student</p>
        <p class="description">
            I am a highly motivated aspiring Software Engineer dedicated to building reliable, 
            scalable solutions. I am passionate about technology's potential to shape the future 
            and am committed to continuous learning and excellence in the field of IT.
        </p>
        <button class="contact-btn">Contact Me</button>
    </div>

</body>
</html>
